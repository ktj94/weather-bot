services:
  weather-bot:
    build: .
    container_name: weather-bot
    restart: unless-stopped

    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      TZ: ${TZ:-Europe/Amsterdam}

    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*bot.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
